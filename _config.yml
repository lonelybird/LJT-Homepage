breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
  - "_posts"
  - "_publications"
  - "_talks"
  - "_teaching"
  - "_portfolio"
  - "_pages/archive-layout-with-content.md"
  - "_pages/category-archive.html"
  - "_pages/collection-archive.html"
  - "_pages/cv-json.md"
  - "_pages/cv.md"
  - "_pages/markdown.md"
  - "_pages/non-menu-page.md"
  - "_pages/page-archive.html"
  - "_pages/portfolio.html"
  - "_pages/sitemap.md"
  - "_pages/tag-archive.html"
  - "_pages/talkmap.html"
  - "_pages/talks.html"
  - "_pages/teaching.html"
  - "_pages/terms.md"
  - "_pages/year-archive.html"

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
