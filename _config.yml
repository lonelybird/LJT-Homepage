name: "Junteng Liu"
description: "Natural language processing and machine learning"
url: "https://lonelybird.github.io"
baseurl: "/LJT-Homepage"
repository: "lonelybird/LJT-Homepage"

author:
  avatar: ""
  name: "Junteng Liu"
  bio: "First-year PhD candidate at HKUST NLP Group working on natural language processing and machine learning."
  employer: "HKUST NLP Group"
